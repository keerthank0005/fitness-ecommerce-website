<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - FitAI Admin</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color:white;
            min-height:100vh;
        }

        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:18px 30px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            box-shadow:0 4px 16px rgba(0,0,0,0.2);
        }

        .navbar h2{
            font-size:22px;
        }

        .nav-links{
            display:flex;
            gap:12px;
        }

        .nav-links a{
            text-decoration:none;
            color:white;
            background:#2563eb;
            padding:10px 14px;
            border-radius:10px;
            font-size:14px;
            transition:0.3s;
        }

        .nav-links a:hover{
            background:#1d4ed8;
        }

        .container{
            width:90%;
            max-width:600px;
            margin:40px auto;
        }

        .form-box{
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            padding:30px;
            border-radius:18px;
            box-shadow:0 10px 30px rgba(0,0,0,0.25);
        }

        .form-box h2{
            text-align:center;
            margin-bottom:20px;
            color:#93c5fd;
        }

        input, textarea, select{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:none;
            border-radius:10px;
            outline:none;
            font-size:14px;
        }

        input, textarea, select{
            background: rgba(255,255,255,0.15);
            color:white;
        }

        input::placeholder,
        textarea::placeholder{
            color:#cbd5e1;
        }

        select option{
            color:black;
        }

        .btn{
            width:100%;
            padding:12px;
            background:#16a34a;
            border:none;
            border-radius:10px;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#15803d;
            transform: translateY(-1px);
        }

        .flash{
            text-align:center;
            margin-bottom:12px;
            padding:10px;
            border-radius:8px;
            font-size:14px;
        }

        .flash.success{
            background:#dcfce7;
            color:#166534;
        }

        .flash.danger{
            background:#fee2e2;
            color:#991b1b;
        }

        @media (max-width:600px){
            .container{
                width:95%;
            }
        }

    </style>
</head>

<body>

    <div class="navbar">
        <h2>➕ Add Product</h2>

        <div class="nav-links">
            <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('admin_logout') }}">Logout</a>
        </div>
    </div>

    <div class="container">

        <div class="form-box">

            <h2>Add New Product</h2>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">

                <input type="text" name="name" placeholder="Product Name" required>

                <input type="number" name="price" placeholder="Price (₹)" required>

                <input type="text" name="category" placeholder="Category" required>

                <input type="text" name="image" placeholder="Image URL" required>

                <textarea name="description" rows="4" placeholder="Product Description"></textarea>

                <button type="submit" class="btn">Add Product 🚀</button>

            </form>

        </div>

    </div>

</body>
</html>
